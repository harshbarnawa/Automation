services:
  api:
    build:
      context: ./backend
    environment:
      APP_ENV: development
      PORT: 8080
      DATABASE_URL: postgres://mintok:mintok@postgres:5432/mintok?sslmode=disable
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - api
    ports:
      - "3000:80"

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: mintok
      POSTGRES_USER: mintok
      POSTGRES_PASSWORD: mintok
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mintok -d mintok"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
